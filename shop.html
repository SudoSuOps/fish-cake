<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fishcake — shop</title>
<meta name="description" content="Refurbished workstations, GPUs, servers, and starter kits. Prices that make sense.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf8f5;--surface:#fff;--surface-2:#f5f0eb;--border:#e8e0d8;--border-light:#f0ebe5;
  --text:#2a2520;--text-2:#6b6058;--text-3:#9a9088;
  --warm:#c8956c;--warm-light:#f5ede5;--warm-deep:#a87040;--accent:#d4854a;--green:#5a8a5c;--red:#c44;
  --radius:10px;--font:'Inter',system-ui,sans-serif;--serif:'Newsreader',Georgia,serif;--max-w:960px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:var(--warm-deep);text-decoration:none}
a:hover{color:var(--accent)}

nav{padding:20px 0;border-bottom:1px solid var(--border-light)}
.nav-inner{max-width:var(--max-w);margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.2rem;font-weight:500}
.logo-fish{font-size:1.4rem;margin-right:6px}
.nav-links{display:flex;gap:28px;font-size:.88rem}
.nav-links a{color:var(--text-2)}
.nav-links a:hover{color:var(--text)}
.nav-active{color:var(--warm-deep)!important;font-weight:500}

.container{max-width:var(--max-w);margin:0 auto;padding:0 24px}

.page-header{padding:48px 0 24px}
.page-header h1{font-family:var(--serif);font-size:2rem;font-weight:400}
.page-header p{color:var(--text-3);font-size:.9rem;margin-top:4px}

/* FILTERS */
.filters{display:flex;gap:8px;padding:16px 0 24px;flex-wrap:wrap;border-bottom:1px solid var(--border-light);margin-bottom:24px}
.filter-btn{padding:8px 18px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text-2);font-size:.82rem;font-family:var(--font);cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--warm);color:var(--text)}
.filter-btn.active{background:var(--warm-deep);color:#fff;border-color:var(--warm-deep)}

/* LISTING GRID */
.listings{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;padding-bottom:48px}

.listing{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.listing:hover{border-color:var(--warm)}

.listing-img{width:100%;aspect-ratio:4/3;background:var(--surface-2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.listing-img img{width:100%;height:100%;object-fit:cover}
.listing-img .placeholder{font-size:3rem;opacity:.3}
.listing-badge{position:absolute;top:12px;left:12px;font-size:.7rem;font-weight:600;padding:4px 10px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}
.badge-sale{background:var(--red);color:#fff}
.badge-new{background:var(--green);color:#fff}
.badge-kids{background:var(--warm-deep);color:#fff}
.badge-sold{background:var(--text-3);color:#fff}
.listing-qty{position:absolute;top:12px;right:12px;font-size:.72rem;padding:4px 8px;background:rgba(42,37,32,.75);color:#fff;border-radius:4px}

.listing-body{padding:20px}
.listing-cat{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--warm-deep);font-weight:600;margin-bottom:6px}
.listing-body h3{font-size:1rem;font-weight:500;margin-bottom:6px;line-height:1.3}
.listing-specs{font-size:.82rem;color:var(--text-3);line-height:1.7;margin-bottom:12px}
.listing-specs li{list-style:none;padding:2px 0}
.listing-specs li::before{content:"·";color:var(--warm);margin-right:8px;font-weight:700}

.listing-footer{display:flex;align-items:baseline;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border-light)}
.listing-price{font-family:var(--serif);font-size:1.4rem;color:var(--text)}
.listing-msrp{font-size:.82rem;color:var(--text-3);text-decoration:line-through;margin-left:8px}
.listing-save{font-size:.75rem;color:var(--green);font-weight:600;background:rgba(90,138,92,.1);padding:3px 8px;border-radius:4px}
.listing-action{padding:8px 20px;background:var(--warm-deep);color:#fff;border:none;border-radius:6px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:var(--font)}
.listing-action:hover{background:var(--accent)}

/* EMPTY STATE */
.empty{text-align:center;padding:64px 24px;color:var(--text-3)}
.empty .icon{font-size:3rem;margin-bottom:12px}

/* ADMIN PANEL (hidden by default) */
.admin-toggle{position:fixed;bottom:20px;right:20px;background:var(--warm-deep);color:#fff;border:none;padding:10px 18px;border-radius:6px;font-size:.82rem;cursor:pointer;font-family:var(--font);z-index:100;display:none}
.admin-panel{position:fixed;top:0;right:-480px;width:480px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:200;transition:right .3s;overflow-y:auto;padding:24px}
.admin-panel.open{right:0}
.admin-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:199;display:none}
.admin-panel h2{font-family:var(--serif);font-size:1.3rem;font-weight:400;margin-bottom:20px}
.admin-panel .close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-3)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.78rem;color:var(--text-3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:.88rem;background:var(--bg);color:var(--text);outline:none}
.fg input:focus,.fg textarea:focus{border-color:var(--warm)}
.fg textarea{min-height:80px;resize:vertical}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.photo-upload{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:border-color .15s}
.photo-upload:hover{border-color:var(--warm)}
.photo-upload input{display:none}
.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.photo-preview img{width:60px;height:60px;object-fit:cover;border-radius:4px;border:1px solid var(--border)}
.btn-full{width:100%;padding:14px;background:var(--warm-deep);color:#fff;border:none;border-radius:6px;font-weight:600;font-size:.92rem;cursor:pointer;font-family:var(--font);margin-top:8px}
.btn-full:hover{background:var(--accent)}
.admin-status{font-size:.82rem;text-align:center;margin-top:8px;min-height:1.2em}

footer{padding:48px 0 32px;border-top:1px solid var(--border-light);text-align:center}
footer p{font-size:.82rem;color:var(--text-3);line-height:1.8}
.footer-fish{font-size:1.4rem;margin-bottom:12px}

@media(max-width:700px){
  .listings{grid-template-columns:1fr}
  .admin-panel{width:100%;right:-100%}
  .filters{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><span class="logo-fish">🐟</span> fishcake</a>
    <div class="nav-links">
      <a href="/shop" class="nav-active">Shop</a>
      <a href="/#kids">Kids</a>
      <a href="/dev">Developer</a>
      <a href="/contact">Contact</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Shop</h1>
    <p>Inventory changes as we source it. When it's gone, it's gone.</p>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" onclick="filterListings('all',this)">All</button>
    <button class="filter-btn" onclick="filterListings('gpu',this)">GPUs</button>
    <button class="filter-btn" onclick="filterListings('workstation',this)">Workstations</button>
    <button class="filter-btn" onclick="filterListings('server',this)">Servers</button>
    <button class="filter-btn" onclick="filterListings('starter',this)">Starter Kits</button>
    <button class="filter-btn" onclick="filterListings('edge',this)">Edge</button>
    <button class="filter-btn" onclick="filterListings('parts',this)">Parts</button>
  </div>

  <!-- LISTINGS -->
  <div class="listings" id="listings"></div>
</div>

<!-- ADMIN PANEL (slide-in) -->
<button class="admin-toggle" id="admin-btn" onclick="openAdmin()">+ Add listing</button>
<div class="admin-overlay" id="admin-overlay" onclick="closeAdmin()"></div>
<div class="admin-panel" id="admin-panel">
  <button class="close" onclick="closeAdmin()">&times;</button>
  <h2>Add listing</h2>
  <form onsubmit="return saveListing(event)">
    <div class="fg">
      <label>Title</label>
      <input type="text" id="a-title" required placeholder="NVIDIA RTX 3090 24GB">
    </div>
    <div class="fg-row">
      <div class="fg">
        <label>Category</label>
        <select id="a-cat">
          <option value="gpu">GPU</option>
          <option value="workstation">Workstation</option>
          <option value="server">Server</option>
          <option value="starter">Starter Kit</option>
          <option value="edge">Edge Device</option>
          <option value="parts">Parts</option>
        </select>
      </div>
      <div class="fg">
        <label>Condition</label>
        <select id="a-condition">
          <option value="Refurbished">Refurbished</option>
          <option value="Used — Good">Used — Good</option>
          <option value="Used — Fair">Used — Fair</option>
          <option value="New">New</option>
          <option value="Open Box">Open Box</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label>Specs (one per line)</label>
      <textarea id="a-specs" placeholder="24GB GDDR6X&#10;10,496 CUDA cores&#10;350W TDP&#10;Triple slot&#10;PCIe 4.0 x16"></textarea>
    </div>
    <div class="fg">
      <label>AI capability</label>
      <input type="text" id="a-ai" placeholder="Runs 9B models in bf16. 27B quantized.">
    </div>
    <div class="fg-row3">
      <div class="fg">
        <label>Price ($)</label>
        <input type="number" id="a-price" required placeholder="699">
      </div>
      <div class="fg">
        <label>MSRP ($)</label>
        <input type="number" id="a-msrp" placeholder="1499">
      </div>
      <div class="fg">
        <label>Qty</label>
        <input type="number" id="a-qty" value="1" min="1">
      </div>
    </div>
    <div class="fg">
      <label>Badge</label>
      <select id="a-badge">
        <option value="">None</option>
        <option value="sale">Sale</option>
        <option value="new">Just In</option>
        <option value="kids">Kids</option>
      </select>
    </div>
    <div class="fg">
      <label>Photos</label>
      <div class="photo-upload" onclick="document.getElementById('a-photos').click()">
        <input type="file" id="a-photos" accept="image/*" multiple onchange="previewPhotos(this)">
        <p style="font-size:.85rem;color:var(--text-3)">Click to add photos</p>
        <p style="font-size:.75rem;color:var(--text-3);margin-top:4px">JPG, PNG — up to 5 images</p>
      </div>
      <div class="photo-preview" id="photo-preview"></div>
    </div>
    <button type="submit" class="btn-full">Add listing</button>
    <p class="admin-status" id="a-status"></p>
  </form>
</div>

<footer>
  <div class="footer-fish">🐟</div>
  <p>fishcake.ai — compute for everyone<br><a href="https://swarmandbee.ai">Swarm & Bee Intelligence</a></p>
</footer>

<script>
// Listings stored in localStorage (later: Supabase/API)
var LISTINGS_KEY = 'fishcake_listings';

function getListings() {
  var stored = localStorage.getItem(LISTINGS_KEY);
  if (stored) return JSON.parse(stored);
  // Seed with initial inventory
  return [
    {id:'fc001',title:'NVIDIA RTX 3090 24GB',cat:'gpu',condition:'Used — Good',specs:['24GB GDDR6X','10,496 CUDA cores','350W TDP','Triple slot, PCIe 4.0','Ampere architecture (sm_86)'],ai:'Runs 9B models bf16. 27B quantized (AWQ). vLLM + Ollama compatible.',price:699,msrp:1499,qty:4,badge:'sale',photos:[],created:Date.now()},
    {id:'fc002',title:'NVIDIA RTX 3090 24GB (EVGA FTW3)',cat:'gpu',condition:'Used — Good',specs:['24GB GDDR6X','10,496 CUDA cores','350W TDP','Triple fan, triple slot','iCX3 cooling'],ai:'Same capability as reference 3090. Better cooling for sustained inference.',price:749,msrp:1799,qty:2,badge:'',photos:[],created:Date.now()-1000},
    {id:'fc003',title:'NVIDIA RTX 3090 24GB (Founders Edition)',cat:'gpu',condition:'Refurbished',specs:['24GB GDDR6X','10,496 CUDA cores','350W TDP','Dual fan flow-through design','Reference PCB'],ai:'Founders Edition — cleanest cooler design. Great for tight builds.',price:679,msrp:1499,qty:1,badge:'',photos:[],created:Date.now()-2000},
    {id:'fc004',title:'NVIDIA RTX 3090 Ti 24GB',cat:'gpu',condition:'Used — Good',specs:['24GB GDDR6X','10,752 CUDA cores','450W TDP','Triple slot','Faster than 3090 by ~10%'],ai:'Slightly faster than 3090. Higher power draw. Same 24GB VRAM.',price:799,msrp:1999,qty:1,badge:'sale',photos:[],created:Date.now()-3000},
    {id:'fc005',title:'Dell Precision 7920 Tower',cat:'workstation',condition:'Refurbished',specs:['Dual Xeon Gold 6148 (40 cores / 80 threads)','128GB DDR4 ECC','512GB NVMe SSD','4x PCIe 3.0 x16 slots','1400W redundant PSU'],ai:'SwarmRig base. Add any GPU. Dual socket = massive CPU for agents + orchestration.',price:1899,msrp:8500,qty:3,badge:'new',photos:[],created:Date.now()-4000},
    {id:'fc006',title:'HP Z4 G4 Tower',cat:'workstation',condition:'Refurbished',specs:['Xeon W-2145 (8 cores / 16 threads)','64GB DDR4 ECC','256GB NVMe SSD','2x PCIe 3.0 x16 slots','750W PSU'],ai:'Great starter workstation. Drop in a T1000 or 3090. One GPU slot.',price:649,msrp:3200,qty:5,badge:'',photos:[],created:Date.now()-5000},
    {id:'fc007',title:"Kid's First Dev Rig",cat:'starter',condition:'Refurbished',specs:['Dell OptiPlex 7060 SFF','Intel i5-8500 (6 cores)','16GB DDR4','256GB SSD','Ubuntu 24.04 + Python + VS Code + Ollama'],ai:'Pre-loaded with dev tools. Add a T1000 for AI. Perfect first computer.',price:149,msrp:0,qty:10,badge:'kids',photos:[],created:Date.now()-6000},
    {id:'fc008',title:'NVIDIA Quadro T1000 4GB',cat:'gpu',condition:'Refurbished',specs:['4GB GDDR6','896 CUDA cores','50W TDP','Low profile, single slot','Fits Dell SFF + Zima Board'],ai:"Kid's GPU. Runs 2B model via Ollama. Tiny, efficient, perfect starter.",price:89,msrp:375,qty:8,badge:'kids',photos:[],created:Date.now()-7000},
  ];
}

function saveListings(listings) {
  localStorage.setItem(LISTINGS_KEY, JSON.stringify(listings));
}

function renderListings(filter) {
  var listings = getListings();
  if (filter && filter !== 'all') {
    listings = listings.filter(function(l) { return l.cat === filter; });
  }
  var container = document.getElementById('listings');

  if (listings.length === 0) {
    container.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="icon">🐟</div><p>No listings in this category yet.</p></div>';
    return;
  }

  container.innerHTML = listings.map(function(l) {
    var save = l.msrp > l.price ? Math.round((1 - l.price/l.msrp)*100) : 0;
    var badgeHTML = '';
    if (l.badge === 'sale') badgeHTML = '<span class="listing-badge badge-sale">Sale</span>';
    else if (l.badge === 'new') badgeHTML = '<span class="listing-badge badge-new">Just In</span>';
    else if (l.badge === 'kids') badgeHTML = '<span class="listing-badge badge-kids">Kids</span>';
    else if (l.badge === 'sold') badgeHTML = '<span class="listing-badge badge-sold">Sold</span>';

    var imgHTML = l.photos && l.photos.length > 0
      ? '<img src="' + l.photos[0] + '" alt="' + l.title + '">'
      : '<div class="placeholder">🐟</div>';

    var specsHTML = l.specs.map(function(s) { return '<li>' + s + '</li>'; }).join('');

    return '<div class="listing" data-cat="' + l.cat + '">' +
      '<div class="listing-img">' + imgHTML + badgeHTML +
        (l.qty > 1 ? '<span class="listing-qty">' + l.qty + ' available</span>' : '') +
      '</div>' +
      '<div class="listing-body">' +
        '<div class="listing-cat">' + l.cat + ' · ' + l.condition + '</div>' +
        '<h3>' + l.title + '</h3>' +
        '<ul class="listing-specs">' + specsHTML + '</ul>' +
        (l.ai ? '<div style="font-size:.78rem;color:var(--text-2);margin-bottom:12px"><strong>AI:</strong> ' + l.ai + '</div>' : '') +
        '<div class="listing-footer">' +
          '<div>' +
            '<span class="listing-price">$' + l.price.toLocaleString() + '</span>' +
            (l.msrp > l.price ? '<span class="listing-msrp">$' + l.msrp.toLocaleString() + '</span>' : '') +
            (save > 0 ? ' <span class="listing-save">' + save + '% off</span>' : '') +
          '</div>' +
          '<button class="listing-action" onclick="inquire(\'' + l.id + '\')">Inquire</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function filterListings(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderListings(cat);
}

function inquire(id) {
  var listings = getListings();
  var item = listings.find(function(l) { return l.id === id; });
  if (!item) return;
  // Send to Discord webhook
  fetch('https://discord.com/api/webhooks/1485069668573122591/LOI8UffI6GQEH5SRuFG_iVq0MgVXH0wKZTFpno09DKGx91cHmZmtvnP6EI3g8N-eyGGd', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      embeds: [{
        title: 'fishcake.ai — Inquiry',
        color: 13208396,
        fields: [
          {name: 'Item', value: item.title, inline: true},
          {name: 'Price', value: '$' + item.price, inline: true},
          {name: 'ID', value: item.id, inline: true}
        ],
        footer: {text: 'fishcake.ai/shop'},
        timestamp: new Date().toISOString()
      }]
    })
  });
  alert('Inquiry sent! We\'ll reach out shortly.');
}

// ADMIN FUNCTIONS
function openAdmin() {
  document.getElementById('admin-panel').classList.add('open');
  document.getElementById('admin-overlay').style.display = 'block';
}
function closeAdmin() {
  document.getElementById('admin-panel').classList.remove('open');
  document.getElementById('admin-overlay').style.display = 'none';
}

function previewPhotos(input) {
  var preview = document.getElementById('photo-preview');
  preview.innerHTML = '';
  Array.from(input.files).slice(0, 5).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = document.createElement('img');
      img.src = e.target.result;
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}

function saveListing(e) {
  e.preventDefault();
  var status = document.getElementById('a-status');
  var specs = document.getElementById('a-specs').value.trim().split('\n').filter(function(s) { return s.trim(); });

  // Get photo data URLs
  var photoInput = document.getElementById('a-photos');
  var photoPromises = Array.from(photoInput.files).slice(0, 5).map(function(file) {
    return new Promise(function(resolve) {
      var reader = new FileReader();
      reader.onload = function(e) { resolve(e.target.result); };
      reader.readAsDataURL(file);
    });
  });

  Promise.all(photoPromises).then(function(photos) {
    var listings = getListings();
    var newListing = {
      id: 'fc' + Date.now().toString(36),
      title: document.getElementById('a-title').value.trim(),
      cat: document.getElementById('a-cat').value,
      condition: document.getElementById('a-condition').value,
      specs: specs,
      ai: document.getElementById('a-ai').value.trim(),
      price: parseInt(document.getElementById('a-price').value) || 0,
      msrp: parseInt(document.getElementById('a-msrp').value) || 0,
      qty: parseInt(document.getElementById('a-qty').value) || 1,
      badge: document.getElementById('a-badge').value,
      photos: photos,
      created: Date.now()
    };

    listings.unshift(newListing);
    saveListings(listings);
    renderListings('all');

    status.style.color = '#5a8a5c';
    status.textContent = 'Listing added!';
    e.target.reset();
    document.getElementById('photo-preview').innerHTML = '';

    // Also notify Discord
    fetch('https://discord.com/api/webhooks/1485069668573122591/LOI8UffI6GQEH5SRuFG_iVq0MgVXH0wKZTFpno09DKGx91cHmZmtvnP6EI3g8N-eyGGd', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        embeds: [{
          title: 'fishcake.ai — New Listing Added',
          color: 5747556,
          fields: [
            {name: 'Item', value: newListing.title},
            {name: 'Price', value: '$' + newListing.price, inline: true},
            {name: 'Qty', value: String(newListing.qty), inline: true},
            {name: 'Category', value: newListing.cat, inline: true}
          ],
          timestamp: new Date().toISOString()
        }]
      })
    });

    setTimeout(function() { closeAdmin(); status.textContent = ''; }, 1500);
  });

  return false;
}

// Show admin button if ?admin is in URL
if (window.location.search.includes('admin')) {
  document.getElementById('admin-btn').style.display = 'block';
}

// Keyboard shortcut: Ctrl+Shift+A opens admin
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === 'A') {
    document.getElementById('admin-btn').style.display = 'block';
    openAdmin();
  }
});

// Initial render
renderListings('all');
</script>

</body>
</html>
